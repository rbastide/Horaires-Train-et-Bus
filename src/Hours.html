<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Horaires - Train et Bus</title>
    <!-- Liaison des script/CSS -->
    <link rel="stylesheet" href="GlobalCSS.css">
    <script src="FrontEnd/Scripts/Loaders/ComponentsLoader/headerLoad.js"></script>
    <script src="FrontEnd/Scripts/Loaders/TrainLoaders/trainSectionLoad.js"></script>
    <script src="FrontEnd/Scripts/Loaders/BusLoaders/busSectionLoad.js"></script>
    <script src="FrontEnd/Scripts/sectionRotate.js"></script>
    <script src="FrontEnd/Scripts/Loaders/TrainLoaders/hoursTrainBoardLoader.js"></script>
    <script src="FrontEnd/Scripts/Loaders/BusLoaders/hoursBusBoardLoader.js"></script>
    <script src="FrontEnd/Scripts/Loaders/BusLoaders/busFooterLoad.js"></script>
    <script src="FrontEnd/Scripts/Loaders/TrainLoaders/trainBoardLoader.js"></script>

  </head>
  <body>
    <!-- Header -->
    <header id="header-placeholder"></header>

    <!-- Main -->
    <main class="container">

      <!-- Section Train chargée dynamiquement -->
      <div class="train-section">

            <!-- Première section Train (titre et description) -->
            <div id="train-section-placeholder"></div>

            <!-- Deuxième section Train (horaires) -->
            <div id="train-board-body"></div>

      </div>

      <!-- Section Bus chargée dynamiquement -->
      <div class="bus-section">

            <!-- Première section Bus (titre et description) -->
            <div id="bus-section-placeholder"></div>

            <!-- Deuxième section Bus (horaires) -->
            <div id="hours-bus-board-placeholder"></div>

            <!-- Troisième section Bus (footer) -->
            <div id="footer-bus-placeholder"></div>

      </div>
      

    </main>

  </body>
  
</html>
