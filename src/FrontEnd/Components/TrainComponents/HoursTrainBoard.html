<section id="prochains-departs" aria-labelledby="prochains-departs-title" class="departures-section">
        <article class="departures-list">
          <!-- header-only table (no border) -->
          <table class="departures-head" aria-hidden="true">
            <colgroup>
              <col style="width:18%">
              <col style="width:12%">
              <col style="width:18%">
              <col style="width:40%">
              <col style="width:12%">
            </colgroup>
            <thead>
              <tr>
                <th>Lignes</th>
                <th>Quais</th>
                <th>Durée</th>
                <th>Heures Départ/Arrivé</th>
                <th>Retard</th>
              </tr>
            </thead>
          </table>

          <!-- body table wrapped so we can draw a single border around it -->
          <div>
            
            <table class="departures-body" aria-describedby="prochains-departs-title">
              <colgroup>
                <col style="width:18%">
                <col style="width:12%">
                <col style="width:18%">
                <col style="width:40%">
                <col style="width:12%">
              </colgroup>

              <!-- Ligne du tableau a l'heure-->
              <tbody>
                      <tr>
                        <td colspan="5">
                          <div class="row-wrapper">
                            <div class="row-grid">

                              <!-- Colonne 1 -->
                              <div class="cell">
                                <div class="line-cell line-cell--train">
                                  <span class="line-badge D31">D31</span>
                                  <img src="FrontEnd/Logo/Train.png" alt="Train" class="line-icon">
                                </div>
                              </div>

                              <!-- Colonne 2 -->
                              <div class="Quais">
                                Voie D
                              </div>

                              <!-- Colonne 3 -->
                              <div class="Time">
                                <img src="FrontEnd/Logo/Horloge.png" alt="Logo - Horloge" class="Horloge">
                                 1h37
                              </div>

                              <!-- Colonne 4 -->
                              <div class="Depart">
                                <p><strong>17:04</strong> Périgueux</p>
                                <p><strong>18:37</strong> Bordeaux Saint-Jean</p>
                              </div>

                              <!-- Colonne 5 -->
                              <div">
                                <span class="status ontime">À l'heure</span>
                              </div>

                            </div>
                          </div>
                        </td>
                      </tr>
                    </tbody>



              <!-- Ligne du tableau en retard-->
              <tbody>
                <tr>
                  <td colspan="5">
                    <div class="row-wrapper">
                            <div class="row-grid">

                    
                
                          <!-- Colonne 1-->
                            <div class="cell">
                            <div class="line-cell line-cell--train">
                              <span class="line-badge L31">L31</span>
                              <img src="FrontEnd/Logo/Train.png" alt="Train" class="line-icon">
                            </div>
                            </div>
                          
                          <!-- Colonne 2 -->
                            <div class="Quais">
                                  Voie D
                            </div>

                            <!-- Colonne 3 -->
                            <div class="Time">
                              <img src="FrontEnd/Logo/Horloge.png" alt="Logo - Horloge" class="Horloge">
                               1h17
                            </div>

                            <!-- Colonne 4 -->
                            <div class="DepartDelayed">
                              <p>17:19 Périgueux</p>

                              <p class="delayedTime"><strong>17:24</strong> Périgueux</p>

                              <p>18:36 Limoges Bénédictins</p>

                              <p class="delayedTime"><strong>18:41</strong> Limoges Bénédictins </p>
                            </div>

                            <!-- Colonne 5 -->
                            <div class="Status">
                              <span class="status delayed">Retard 5 min</span>
                            </div>


                        
                      </div>
                   </div>
                   
                </tr>
              </tbody>




            </table>
          </div>
        </article>
      </section>
